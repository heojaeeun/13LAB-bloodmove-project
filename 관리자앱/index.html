  <!-- React 18 + Babel (JSX in-browser) + Tailwind Play CDN + lucide-react UMD -->

  <style>
    body { background: #09090B; }

    .glow-stroke { filter: drop-shadow(0 0 5px rgba(255,69,0,.85)) drop-shadow(0 0 16px rgba(255,69,0,.35)); }
    .glow-text   { text-shadow: 0 0 14px rgba(255,69,0,.55); }

    .arc-progress { transition: stroke-dashoffset 1.6s cubic-bezier(.22,1,.36,1); }

    .sos-ring.d2 { animation-delay: .55s; }
    .sos-ring.d3 { animation-delay: 1.1s; }

    @keyframes soft-blink { 0%,100% { opacity:1; } 50% { opacity:.35; } }
    .soft-blink { animation: soft-blink 1.6s ease-in-out infinite; }

    @keyframes radar-sweep { to { transform: rotate(360deg); } }
    .radar-sweep {
      background: conic-gradient(from 0deg, rgba(255,69,0,.55), rgba(255,69,0,.12) 55deg, transparent 70deg);
      animation: radar-sweep 3.6s linear infinite;
    }

    /* vertical metro segment — flowing dashes */
    @keyframes flow-y { to { background-position-y: 26px; } }
    .flow-y {
      background-image: repeating-linear-gradient(180deg, #FF4500 0 7px, transparent 7px 13px);
      animation: flow-y 1s linear infinite;
      filter: drop-shadow(0 0 4px rgba(255,69,0,.8));
    }

    @keyframes overlay-pulse { 0%,100% { opacity:.35; } 50% { opacity:.75; } }
    .overlay-pulse { animation: overlay-pulse 1.4s ease-in-out infinite; }

    /* ── SOS acknowledgement motion ── */
    @keyframes ack-flash { 0% { opacity: .85; } 100% { opacity: 0; } }
    .ack-flash { animation: ack-flash .7s ease-out forwards; }

    @keyframes icon-pop {
      0%   { transform: scale(.35) rotate(-20deg); opacity: 0; }
      55%  { transform: scale(1.12) rotate(4deg);  opacity: 1; }
      100% { transform: scale(1) rotate(0deg); }
    }
    .icon-pop { animation: icon-pop .6s cubic-bezier(.22,1,.36,1); }

    @keyframes rise-in {
      0%   { transform: translateY(14px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .rise-in { animation: rise-in .5s cubic-bezier(.22,1,.36,1) both; }

    .app-scroll { scrollbar-width: none; overscroll-behavior: contain; }
    .app-scroll::-webkit-scrollbar { display: none; }

    .no-touch-callout { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }

    /* ── tracking map (Leaflet) — tactical dark theme ── */
    .leaflet-container { background: #050506; font-family: Inter, sans-serif; }
    .leaflet-tile-pane { filter: saturate(.5) brightness(.82) contrast(1.18); }
    .leaflet-control-attribution {
      background: rgba(0,0,0,.55) !important; color: #52525b !important;
      font-size: 8px; padding: 1px 5px;
    }
    .leaflet-control-attribution a { color: #71717a !important; }

    .map-node-done {
      width: 14px; height: 14px; border-radius: 9999px;
      background: #FF4500; border: 2px solid #000; box-sizing: border-box;
      box-shadow: 0 0 8px rgba(255,69,0,.9), 0 0 18px rgba(255,69,0,.45);
    }
    .map-node-next {
      width: 12px; height: 12px; border-radius: 9999px;
      background: #141418; border: 2px solid #52525b; box-sizing: border-box;
    }
    .map-node-current { position: relative; width: 24px; height: 24px; }
    .map-node-current .core {
      position: absolute; inset: 5px; border-radius: 9999px;
      background: #FF4500; border: 2px solid #fff; box-sizing: border-box;
      box-shadow: 0 0 10px rgba(255,69,0,.95), 0 0 26px rgba(255,69,0,.5);

    .map-node-current .ring {
      position: absolute; inset: 0; border-radius: 9999px;
      border: 2px solid #FF4500;
      animation: sos-ring 1.6s cubic-bezier(0,0,.2,1) infinite;

    .map-label {
      background: rgba(0,0,0,.8); border: 1px solid rgba(255,69,0,.35);
      border-radius: 7px; padding: 2px 6px; box-shadow: none;

      font-size: 8.5px; font-weight: 600; letter-spacing: .14em;

    .map-label::before { display: none; }

    /* ── drone marker + radar rings ── */
    @keyframes drone-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
    @keyframes radar-ping {
      0%   { transform: scale(.3); opacity: .65; }
      100% { transform: scale(2.6); opacity: 0; }
    }
    .drone-marker { position: relative; width: 34px; height: 34px; }
    .drone-marker .radar-ring {
      position: absolute; inset: 0; border-radius: 9999px;
      border: 1.5px solid rgba(255,69,0,.8);
      animation: radar-ping 2.2s cubic-bezier(0,0,.2,1) infinite;
    }
    .drone-marker .radar-ring.d2 { animation-delay: .75s; }
    .drone-marker .radar-ring.d3 { animation-delay: 1.5s; }
    .drone-marker .drone-body {
      position: absolute; left: 50%; top: 50%; width: 22px; height: 22px;
      transform: translate(-50%, -50%);
      animation: drone-bob 1.8s ease-in-out infinite;
      filter: drop-shadow(0 0 6px rgba(255,69,0,.95)) drop-shadow(0 0 14px rgba(255,69,0,.55));
    }

    /* HUD reticle corners over the tracking map — screen-space, not tied to map pan/zoom */
    .hud-corner { position: absolute; width: 18px; height: 18px; border-color: rgba(255,69,0,.55); z-index: 650; pointer-events: none; }
    .hud-corner.tl { top: 10px; left: 10px; border-top: 2px solid; border-left: 2px solid; border-radius: 4px 0 0 0; }
    .hud-corner.tr { top: 10px; right: 10px; border-top: 2px solid; border-right: 2px solid; border-radius: 0 4px 0 0; }
    .hud-corner.bl { bottom: 10px; left: 10px; border-bottom: 2px solid; border-left: 2px solid; border-radius: 0 0 0 4px; }
    .hud-corner.br { bottom: 10px; right: 10px; border-bottom: 2px solid; border-right: 2px solid; border-radius: 0 0 4px 0; }

    /* faint tactical grid wash over the map, additive over dark tiles */
    .hud-grid {
      background-image:
        linear-gradient(rgba(255,69,0,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,69,0,.06) 1px, transparent 1px);
      background-size: 28px 28px;
      mix-blend-mode: screen;
    }

    .stat-chip {
      border-radius: 14px; border: 1px solid rgba(63,63,70,.7); background: rgba(20,20,24,.9);
      padding: 7px 9px;
    }
  </style>
</head>
<body class="font-body text-white antialiased">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;
    const {

      X, Satellite, Signal, Truck, Crosshair, Clock,
      Droplet, Radar, Battery, Gauge, Timer,
    } = LucideReact;

    /* ═══════════════════════ MOCK DATA ═══════════════════════ */

    const OPERATION = {
      unit: 'R-07 피닉스', sector: '서울 · F7 구역',
      incident: '건물 붕괴', progress: 68,
      rescued: 34, treatment: 12, awaiting: 7,
    };
    const REMAINING = OPERATION.treatment + OPERATION.awaiting;

    const ROUTE = [
      { name: '혈액은행 창고',        detail: '12:40 · 출발',        state: 'done',    pos: [37.5199, 126.9285] },
      { name: '체크포인트 알파',      detail: '13:05 · 통과',        state: 'done',    pos: [37.5268, 126.9468] },
      { name: '드론 · 이동 중',       detail: '고도 85M · 42 KM/H',  state: 'current', pos: [37.5326, 126.9652] },
      { name: '체크포인트 브라보',    detail: '도착예정 13:55',      state: 'next',    pos: [37.5389, 126.9822] },
      { name: '세인트메리병원 · 응급실', detail: '도착예정 14:20',   state: 'next',    pos: [37.5451, 126.9971] },

    const MISSION = {

      battery: '76%', gps: '8/8 LOCK', status: '이동 중', team: '드론 운용팀 알파',
    };

    const TRIAGE_STYLE = {
      P1: { label: 'P1 · 즉시', chip: 'bg-ember-500/15 text-ember-400 border-ember-500/40', bar: 'bg-ember-500' },
      P2: { label: 'P2 · 지연', chip: 'bg-amber-400/10 text-amber-300 border-amber-400/30', bar: 'bg-amber-400' },
      P3: { label: 'P3 · 경미', chip: 'bg-emerald-400/10 text-emerald-300 border-emerald-400/30', bar: 'bg-emerald-400' },
    };

    const PATIENTS = [
      { id: 'PT-0492', name: '김 S.',  age: 34, triage: 'P1', hr: 128, spo2: 84, bp: '88/56',  rr: 26, note: '압궤 손상 · 좌측 다리', medic: 'MED-04',
        log: [ ['13:34', '지혈대 적용 — 좌측 대퇴'], ['13:29', '정맥로 확보 ×2 · 수액 시작'], ['13:24', 'C블록 잔해에서 구조'] ] },
      { id: 'PT-0491', name: '박 J.', age: 61, triage: 'P1', hr: 142, spo2: 79, bp: '82/50',  rr: 30, note: '내출혈 의심', medic: 'MED-02',
        log: [ ['13:31', 'FAST 검사 양성 · 복부'], ['13:26', '산소 15L 비재호흡 마스크'], ['13:20', '무반응 상태로 발견 · GCS 11'] ] },
      { id: 'PT-0488', name: '이 H.',  age: 27, triage: 'P2', hr: 96,  spo2: 93, bp: '112/74', rr: 20, note: '골절 · 우측 팔', medic: 'MED-07',
        log: [ ['13:18', '부목 고정 · 통증 6/10'], ['13:11', '도움 없이 분류소까지 보행'] ] },
      { id: 'PT-0486', name: '최 M.', age: 45, triage: 'P2', hr: 88,  spo2: 95, bp: '124/80', rr: 18, note: '열상 · 두부', medic: 'MED-07',
        log: [ ['13:09', '압박 드레싱 · 출혈 조절됨'], ['13:02', '분류소에 자진 내원'] ] },
      { id: 'PT-0483', name: '정 W.', age: 19, triage: 'P3', hr: 82,  spo2: 98, bp: '118/76', rr: 16, note: '찰과상 · 양손', medic: 'MED-11',
        log: [ ['12:58', '상처 세척 및 드레싱'] ] },
      { id: 'PT-0479', name: '한 Y.',  age: 52, triage: 'P3', hr: 76,  spo2: 97, bp: '130/84', rr: 17, note: '연기 흡입 · 경미', medic: 'MED-11',
        log: [ ['12:51', '산소 4L 비강캐뉼라 · 호전 중'] ] },
    ];

    const SHELTERS = [
      { name: '의료 캠프 · 야전병원 7',   used: 58,  cap: 60  },
      { name: '알파 · 잠실 체육관',       used: 342, cap: 400 },
      { name: '브라보 · 리버사이드 학교', used: 198, cap: 250 },
    ];

    const FEED = [
      { time: '13:36', text: 'PT-0492, 야전병원 7로 이송',            hot: true  },
      { time: '13:31', text: '신규 부상자 발견 — C블록 잔해',          hot: true  },
      { time: '13:24', text: 'K9 수색견팀, C블록 생존자 2명 확인',     hot: false },
      { time: '13:18', text: '브라보 경로 구급차 통행 가능',           hot: false },
    ];

    /* ═══════════════════════ STATUS BAR + HEADER ═══════════════════════ */

    const useClock = (fmt) => {
      const [now, setNow] = useState(new Date());
      useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(t);
      }, []);
      return fmt(now);
    };

    const StatusBar = () => {
      const hhmm = useClock((d) => d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }));
      return (
        <div className="relative z-30 flex items-center justify-between px-8 pt-4 pb-1">
          <span className="font-display text-[13px] font-semibold tabular-nums tracking-wide">{hhmm}</span>
          {/* dynamic island */}
          <span className="absolute left-1/2 top-3 h-[26px] w-[100px] -translate-x-1/2 rounded-full bg-black ring-1 ring-zinc-800/80" />
          <span className="flex items-center gap-1.5 text-zinc-300">
            <Signal size={13} /><Satellite size={13} className="text-ember-400" />
            <span className="ml-0.5 inline-block h-[10px] w-[20px] rounded-[3px] border border-zinc-500 p-[1.5px]">
              <span className="block h-full w-[70%] rounded-[1px] bg-emerald-400" />
            </span>
          </span>
        </div>
      );
    };

    /* drone glyph — quad-rotor + capsule payload, used for the app mark */
    const DroneMark = ({ size = 18, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" className={className}>
        <circle cx="4" cy="4" r="2.3" fill="currentColor" />
        <circle cx="20" cy="4" r="2.3" fill="currentColor" />
        <circle cx="4" cy="20" r="2.3" fill="currentColor" />
        <circle cx="20" cy="20" r="2.3" fill="currentColor" />
        <path d="M5.4 5.4 L10 10 M18.6 5.4 L14 10 M5.4 18.6 L10 14 M18.6 18.6 L14 14" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" />
        <rect x="8" y="9" width="8" height="6" rx="1.8" fill="currentColor" />
        <path d="M11 15 L11 18 M13 15 L13 18" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" />
      </svg>
    );

    const AppHeader = () => (
      <header className="flex items-center justify-between px-5 pb-3 pt-2">
        <div className="flex items-center gap-2.5">
          <div className="grid h-9 w-9 place-items-center rounded-xl bg-ember-500 shadow-[0_0_20px_rgba(255,69,0,0.45)]">
            <DroneMark size={19} className="text-black" />
          </div>
          <div>
            <h1 className="font-display text-[15px] font-bold leading-none tracking-[0.14em]">
              BLOODMOVE <span className="text-ember-500 glow-text">CMD</span>
            </h1>
            <p className="mt-1 font-display text-[8.5px] tracking-[0.2em] text-zinc-500">
              {OPERATION.sector} · {OPERATION.incident}
            </p>
          </div>
        </div>
        <span className="inline-flex items-center gap-1.5 rounded-full border border-zinc-800 bg-void-raise px-2.5 py-1 font-display text-[9px] font-semibold tracking-widest text-zinc-300">
          <span className="h-1.5 w-1.5 rounded-full bg-emerald-400 soft-blink" />실시간
        </span>
      </header>
    );

    /* ═══════════ TOP — GAUGE CARD (tap ⇒ crossfade progress ⇄ remaining) ═══════════ */

    const GaugeCard = () => {
      const [pct, setPct] = useState(0);
      const [view, setView] = useState('progress');   // 'progress' | 'remaining'
      useEffect(() => { const t = setTimeout(() => setPct(OPERATION.progress), 150); return () => clearTimeout(t); }, []);

      // glowing cap that rides the arc at the exact progress point
      const arcRef = useRef(null);
      const [cap, setCap] = useState(null);
      useEffect(() => {
        if (!arcRef.current) return;
        const len = arcRef.current.getTotalLength();
        const pt = arcRef.current.getPointAtLength(len * (pct / 100));
        setCap({ x: pt.x, y: pt.y });
      }, [pct]);

      const arcPath = 'M 30.7 155 A 80 80 0 1 1 169.3 155';
      // anchored at the arc's center (cy 100 of viewBox height 172), nudged down for optical balance
      const face = (key, num, unit, label) => (
        <div className={`absolute left-0 right-0 top-[59%] flex -translate-y-1/2 flex-col items-center transition-all duration-300 ease-in-out ${view === key ? 'opacity-100 scale-100' : 'opacity-0 scale-90 pointer-events-none'}`}>
          <div className={`flex items-baseline justify-center font-display text-[52px] font-bold tabular-nums leading-none ${key === 'remaining' ? 'text-amber-300' : ''} glow-text`}>
            {num}
            {unit && <span className="ml-0.5 text-2xl text-ember-400">{unit}</span>}
          </div>
          <div className="mt-2 font-display text-[9px] font-semibold tracking-[0.26em] text-zinc-400">{label}</div>
        </div>
      );

      return (
        <button
          type="button"
          onClick={() => setView(view === 'progress' ? 'remaining' : 'progress')}
          aria-pressed={view === 'remaining'}
          data-testid="gauge"
          className="mx-4 block w-[calc(100%-2rem)] rounded-3xl border border-zinc-800/70 bg-void-panel/90 px-4 pb-4 pt-3 text-center outline-none transition-all duration-300 ease-in-out active:scale-[0.98] focus-visible:ring-2 focus-visible:ring-ember-500/50"
        >
          <div className="flex items-center justify-between">
            <span className="flex items-center gap-1.5 font-display text-[10px] font-semibold tracking-[0.2em] text-zinc-400">
              <Activity size={12} className="text-ember-500" />작전 현황
            </span>
            <span className="font-display text-[8.5px] tracking-[0.18em] text-zinc-600">탭하여 전환</span>
          </div>

          <div className="relative mx-auto mt-1 w-full max-w-[210px]">
            <svg viewBox="0 0 200 172" className="w-full">
              <path d={arcPath} fill="none" stroke="url(#emberTrackGrad)" strokeWidth="13" strokeLinecap="round" />
              <path
                ref={arcRef}
                d={arcPath} fill="none" stroke="url(#emberGrad)" strokeWidth="13" strokeLinecap="round"
                pathLength="100" strokeDasharray="100" strokeDashoffset={100 - pct}
                className="arc-progress glow-stroke"
              />
              {cap && (
                <circle cx={cap.x} cy={cap.y} r="7.5" fill="#fff" stroke="#FF4500" strokeWidth="3"
                  className="glow-stroke" />
              )}
              <defs>
                <linearGradient id="emberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stopColor="#FFB199" /><stop offset="55%" stopColor="#FF7A45" /><stop offset="100%" stopColor="#FF4500" />
                </linearGradient>
                <linearGradient id="emberTrackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stopColor="#2a0e02" /><stop offset="100%" stopColor="#1c1c20" />
                </linearGradient>
              </defs>
            </svg>
            {face('progress', pct, '%', '구조 완료율')}
            {face('remaining', REMAINING, '', '남은 부상자')}
          </div>

          <div className="mt-1 grid grid-cols-3 gap-2">
            {[
              [CheckCircle2, OPERATION.rescued, '구조됨', 'text-emerald-400'],
              [HeartPulse, OPERATION.treatment, '치료 중', 'text-ember-400'],
              [AlertTriangle, OPERATION.awaiting, '대기 중', 'text-amber-400'],
            ].map(([Icon, v, l, tone]) => (
              <span key={l} className="rounded-2xl border border-zinc-800/70 bg-void-raise px-2 py-2">

              {stop.name}
            </div>
            <div className={`mt-0.5 font-mono text-[10px] ${stop.state === 'current' ? 'text-ember-300' : 'text-zinc-500'}`}>{stop.detail}</div>
          </div>
        </li>
      );
    };

    /* live tactical map — dark tiles + route polyline + waypoint nodes */
    const TrackingMap = ({ active, heightClass = 'h-[248px]' }) => {
      const holder = useRef(null);
      const mapRef = useRef(null);

      useEffect(() => {
        if (!active || mapRef.current || !window.L || !holder.current) return;
        const L = window.L;

        const map = L.map(holder.current, { zoomControl: false, attributionControl: true });
        map.attributionControl.setPrefix(false);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          maxZoom: 19,
          attribution: '© OpenStreetMap · © CARTO',
        }).addTo(map);

        const pts = ROUTE.map((r) => r.pos);
        const curIdx = ROUTE.findIndex((r) => r.state === 'current');

        // covered leg — ember glow (wide soft pass + thin solid pass)
        const doneLeg = pts.slice(0, curIdx + 1);
        L.polyline(doneLeg, { color: '#FF4500', weight: 9, opacity: 0.16 }).addTo(map);
        L.polyline(doneLeg, { color: '#FF4500', weight: 3, opacity: 0.95 }).addTo(map);
        // remaining leg — dashed
        L.polyline(pts.slice(curIdx), { color: '#8b8b94', weight: 2.5, opacity: 0.8, dashArray: '5 8' }).addTo(map);

        // operation perimeter around the collapse zone
        L.circle(pts[curIdx], {
          radius: 420, color: '#FF4500', weight: 1.5, dashArray: '4 6',
          fillColor: '#FF4500', fillOpacity: 0.07,
        }).addTo(map);

        const DRONE_SVG = `
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="5" cy="5" r="2.6" fill="#FF4500" stroke="#000" stroke-width="1"/>
            <circle cx="19" cy="5" r="2.6" fill="#FF4500" stroke="#000" stroke-width="1"/>
            <circle cx="5" cy="19" r="2.6" fill="#FF4500" stroke="#000" stroke-width="1"/>
            <circle cx="19" cy="19" r="2.6" fill="#FF4500" stroke="#000" stroke-width="1"/>
            <path d="M5 5 L12 12 L19 5 M5 19 L12 12 L19 19" stroke="#FFB199" stroke-width="1.4"/>
            <rect x="8.5" y="9" width="7" height="6" rx="1.8" fill="#0a0a0c" stroke="#fff" stroke-width="1.2"/>
            <circle cx="12" cy="12" r="1.5" fill="#fff"/>
          </svg>`;

        ROUTE.forEach((r) => {
          const html =
            r.state === 'current'
              ? `<div class="drone-marker">
                   <span class="radar-ring"></span><span class="radar-ring d2"></span><span class="radar-ring d3"></span>
                   <span class="drone-body">${DRONE_SVG}</span>
                 </div>`
              : r.state === 'done'
              ? '<div class="map-node-done"></div>'
              : '<div class="map-node-next"></div>';
          const size = r.state === 'current' ? 34 : 14;
          L.marker(r.pos, { icon: L.divIcon({ className: '', html, iconSize: [size, size], iconAnchor: [size / 2, size / 2] }) })
            .addTo(map)
            .bindTooltip(r.state === 'current' ? 'DRONE — LIVE' : r.name, {
              permanent: true, direction: 'top', offset: [0, r.state === 'current' ? -16 : -10],
              className: `map-label${r.state === 'current' ? ' is-current' : ''}`,
            });
        });

        const bounds = L.latLngBounds(pts);
        const refit = () => {
          map.invalidateSize({ animate: false });
          map.fitBounds(bounds, { padding: [30, 30], animate: false });
        };
        refit();
        mapRef.current = map;
        map._refit = refit;
        holder.current._map = map;

        // container may still be mid-layout (font/JIT/slide-up) — refit once settled
        const t1 = setTimeout(refit, 350);
        const t2 = setTimeout(refit, 1000);
        const ro = new ResizeObserver(() => map.invalidateSize());
        ro.observe(holder.current);
        return () => { clearTimeout(t1); clearTimeout(t2); ro.disconnect(); };
      }, [active]);

      // re-measure once the slide-up transition finishes
      useEffect(() => {
        if (active && mapRef.current) {
          const t = setTimeout(() => mapRef.current._refit(), 450);
          return () => clearTimeout(t);
        }
      }, [active]);

      return <div ref={holder} data-testid="tracking-map" className={`${heightClass} w-full`} />;
    };

    /* map + tactical overlays — used on the main screen and inside the route sheet */
    const TrackingPanel = ({ active, className = '', heightClass, expanded = false }) => (
      <div className={`relative overflow-hidden rounded-3xl border border-zinc-800/70 shadow-[0_0_24px_rgba(255,69,0,0.12)] ${className}`}>

        {/* corner scanline vignette */}

        {/* HUD reticle corners */}
        <span className="hud-corner tl" /><span className="hud-corner tr" />
        <span className="hud-corner bl" /><span className="hud-corner br" />

        <div className="pointer-events-none absolute inset-x-3 bottom-3 z-[700] flex items-end justify-between gap-2">
          <div className="rounded-2xl border border-zinc-800/80 bg-black/80 px-3 py-2 backdrop-blur-sm">
            <div className="font-display text-[8px] tracking-[0.2em] text-zinc-500">DRONE POSITION</div>
            <div className="mt-0.5 font-mono text-[11px] font-semibold">37.5326 N · 126.9652 E</div>
          </div>
          <span className="inline-flex items-center gap-1.5 rounded-full border border-emerald-400/30 bg-black/80 px-2.5 py-1.5 font-display text-[8.5px] font-semibold tracking-widest text-emerald-300 backdrop-blur-sm">
            <Satellite size={10} />GPS LOCK · {MISSION.gps}
          </span>
        </div>
        <span className="pointer-events-none absolute left-3 top-3 z-[700] inline-flex items-center gap-1.5 rounded-full border border-ember-500/40 bg-black/80 px-2.5 py-1 font-display text-[8.5px] font-semibold tracking-widest text-ember-300 backdrop-blur-sm">
          <span className="h-1.5 w-1.5 rounded-full bg-ember-500 soft-blink" />LIVE MAP
        </span>
        {expanded && (
          <span className="pointer-events-none absolute right-3 top-3 z-[700] inline-flex items-center gap-1.5 rounded-full border border-zinc-700 bg-black/80 px-2.5 py-1 font-display text-[8.5px] font-semibold tracking-widest text-zinc-300 backdrop-blur-sm">
            <Radar size={11} className="text-ember-400" />SCANNING
          </span>
        )}
      </div>
    );

    /* main-screen tracking section — visible on launch */
    const LiveTracking = () => (
      <section className="px-4 pt-5" data-testid="live-tracking">
        <h2 className="mb-2.5 flex items-center justify-between px-1 font-display text-[10px] font-semibold tracking-[0.2em] text-zinc-400">
          <span className="flex items-center gap-1.5"><Crosshair size={12} className="text-ember-500" />LIVE TRACKING</span>
          <span className="text-[8.5px] text-zinc-600">TAP TRACKING FOR ROUTE</span>
        </h2>
        <TrackingPanel active={true} />
      </section>
    );

    const RouteSheet = ({ open, onClose }) => (
      <div className={`absolute inset-0 z-40 ${open ? '' : 'pointer-events-none'}`} aria-hidden={!open} data-testid="route-sheet">
        <div
          onClick={onClose}
          className={`absolute inset-0 bg-black/70 backdrop-blur-[2px] transition-opacity duration-300 ease-in-out ${open ? 'opacity-100' : 'opacity-0'}`}
        />
        <div
          className={`absolute inset-x-0 bottom-0 max-h-[86%] overflow-y-auto app-scroll rounded-t-[34px] border-t border-x border-ember-500/30 bg-void-panel shadow-[0_-10px_60px_rgba(255,69,0,0.15)] transition-[transform,visibility] duration-[400ms] ease-in-out ${open ? 'visible translate-y-0' : 'invisible translate-y-full'}`}
        >
          <button type="button" onClick={onClose} aria-label="Close route" className="mx-auto block w-full pt-3 pb-1">
            <span className="mx-auto block h-1.5 w-12 rounded-full bg-zinc-700" />
          </button>

          <div className="px-6 pb-8">
            <div className="flex items-center justify-between pt-2">
              <div>
                <h2 className="flex items-center gap-2 font-display text-[13px] font-bold tracking-[0.16em]">

                <p className="mt-1 flex items-center gap-1.5 font-mono text-[9.5px] text-zinc-500">
                  MISSION {MISSION.id} <span className="text-zinc-700">·</span>
                  <Droplet size={10} className="text-ember-400" />{MISSION.cargo}
                </p>
              </div>
              <span className="inline-flex shrink-0 items-center gap-1.5 rounded-full border border-emerald-400/30 bg-emerald-400/10 px-2.5 py-1 font-display text-[9px] font-semibold tracking-widest text-emerald-300">
                <span className="h-1.5 w-1.5 rounded-full bg-emerald-400 soft-blink" />{MISSION.status}
              </span>
            </div>

            {/* MAIN VISUAL — live tactical map + drone position overlay */}
            <TrackingPanel active={open} className="mt-4" heightClass="h-[300px]" expanded />

            {/* at-a-glance mission stats */}
            <div className="mt-3 grid grid-cols-3 gap-2">
              <div className="stat-chip col-span-1">
                <div className="flex items-center gap-1 font-display text-[7.5px] tracking-[0.16em] text-zinc-500"><Building2 size={10} className="text-ember-500" />DESTINATION</div>
                <div className="mt-1 truncate font-display text-[11px] font-bold text-white">{MISSION.destination}</div>
              </div>
              <div className="stat-chip col-span-1">
                <div className="flex items-center gap-1 font-display text-[7.5px] tracking-[0.16em] text-zinc-500"><Truck size={10} className="text-ember-500" />DIST. LEFT</div>
                <div className="mt-1 font-mono text-[13px] font-bold text-ember-300">{MISSION.distance}</div>
              </div>
              <div className="stat-chip col-span-1">
                <div className="flex items-center gap-1 font-display text-[7.5px] tracking-[0.16em] text-zinc-500"><Timer size={10} className="text-ember-500" />ETA</div>
                <div className="mt-1 font-mono text-[13px] font-bold text-white">{MISSION.eta}</div>

              <div className="stat-chip col-span-1">

                <div className="mt-1 font-mono text-[13px] font-bold text-zinc-200">{MISSION.battery}</div>
              </div>
            </div>

            <div className="mt-3 flex items-center justify-between rounded-2xl border border-zinc-800/70 bg-void-raise px-3.5 py-2.5">
              <span className="flex items-center gap-1.5 font-display text-[9px] tracking-[0.18em] text-zinc-500">
                <Users size={12} className="text-ember-400" />{MISSION.team}
              </span>
              <span className="font-mono text-[10px] text-zinc-500">MISSION ID · {MISSION.id}</span>
            </div>

            <h3 className="mb-2 mt-5 flex items-center gap-1.5 px-1 font-display text-[9.5px] font-semibold tracking-[0.2em] text-zinc-500">
              <Crosshair size={11} className="text-ember-500" />ROUTE CHECKPOINTS
            </h3>
            <ol className="pl-1">
              {ROUTE.map((stop, i) => <RouteStop key={stop.name} stop={stop} isLast={i === ROUTE.length - 1} />)}
            </ol>
          </div>
        </div>
      </div>
    );

    /* ═══════════ SOS OVERLAY — full-screen broadcast state ═══════════ */

    const SosOverlay = ({ open, onCancel, onTrackDrone }) => {
      const COUNT_FROM = 10;
      const [count, setCount] = useState(COUNT_FROM);
      const [justAcked, setJustAcked] = useState(false);
      const wasAcked = useRef(false);

      useEffect(() => {
        if (!open) return;
        setCount(COUNT_FROM);
        wasAcked.current = false;
        setJustAcked(false);
        const t = setInterval(() => setCount((c) => Math.max(c - 1, 0)), 1000);
        return () => clearInterval(t);
      }, [open]);

      const acked = count === 0;

      // fire a one-shot screen flash + pop the instant we cross into acknowledged
      useEffect(() => {
        if (acked && !wasAcked.current) {
          wasAcked.current = true;
          setJustAcked(true);
          const t = setTimeout(() => setJustAcked(false), 700);
          return () => clearTimeout(t);
        }
      }, [acked]);

      return (
        <div
          data-testid="sos-overlay"
          aria-hidden={!open}
          className={`absolute inset-0 z-50 flex flex-col items-center justify-between bg-black px-6 pb-10 pt-20 text-center transition-all duration-300 ease-in-out ${open ? 'opacity-100' : 'pointer-events-none opacity-0 scale-105'}`}
        >
          <div className={`overlay-pulse absolute inset-0 bg-[radial-gradient(circle_at_50%_35%,${acked ? 'rgba(16,185,129,0.22)' : 'rgba(255,69,0,0.28)'},transparent_65%)] transition-colors duration-500`} />
          {justAcked && <div className="ack-flash pointer-events-none absolute inset-0 bg-emerald-300" />}

          <div className="relative w-full max-w-[300px]">
            <div className="relative mx-auto grid h-36 w-36 place-items-center">
              {/* depleting countdown ring — visual proxy for "time to auto-dispatch" */}
              {!acked && (
                <svg viewBox="0 0 144 144" className="absolute inset-0 -rotate-90">
                  <circle cx="72" cy="72" r="66" fill="none" stroke="#3a1400" strokeWidth="4" />
                  <circle
                    cx="72" cy="72" r="66" fill="none" stroke="#FF4500" strokeWidth="4" strokeLinecap="round"
                    pathLength="100" strokeDasharray="100" strokeDashoffset={100 - (count / COUNT_FROM) * 100}
                    className="transition-[stroke-dashoffset] duration-[950ms] ease-linear glow-stroke"
                  />
                </svg>
              )}
              {!acked ? (
                <>
                  <span className="sos-ring absolute inset-0 rounded-full border-2 border-ember-500" />
                  <span className="sos-ring d2 absolute inset-0 rounded-full border-2 border-ember-500" />
                  <span className="sos-ring d3 absolute inset-0 rounded-full border-2 border-ember-500" />
                  <span className="grid h-28 w-28 place-items-center rounded-full bg-ember-500 shadow-[0_0_60px_rgba(255,69,0,0.7)]">
                    <Siren size={50} className="text-black" strokeWidth={2.2} />
                  </span>
                </>
              ) : (
                <span key="ack-icon" className="icon-pop grid h-28 w-28 place-items-center rounded-full bg-emerald-400 shadow-[0_0_60px_rgba(16,185,129,0.6)]">
                  <CheckCircle2 size={52} className="text-black" strokeWidth={2.4} />
                </span>
              )}
            </div>

            <h2 className={`mt-7 font-display text-2xl font-bold tracking-[0.14em] transition-colors duration-300 ${acked ? 'text-emerald-300' : 'text-ember-400 glow-text'}`}>
              {acked ? 'DRONE DISPATCHED' : 'SOS BROADCASTING'}
            </h2>
            <p className="mt-1.5 font-display text-[11px] tracking-[0.2em] text-zinc-400">
              {acked ? 'BLOODMOVE MEDEVAC · POSITION LOCKED' : 'PRIORITY CHANNEL 07 · POSITION ATTACHED'}
            </p>

            {!acked ? (
              <div className="mt-7">
                <div className="font-display text-[10px] tracking-[0.24em] text-zinc-500">DISPATCH CONFIRMATION IN</div>
                <div className="mt-1 font-mono text-6xl font-semibold tabular-nums text-white glow-text">
                  00:{String(count).padStart(2, '0')}
                </div>
              </div>
            ) : (
              <div className="rise-in mt-5">
                <div className="flex items-center justify-center gap-2 rounded-2xl border border-emerald-400/40 bg-emerald-400/10 px-4 py-2.5 font-display text-[12px] font-bold tracking-[0.14em] text-emerald-300">
                  <CheckCircle2 size={15} />COMMAND ACKNOWLEDGED
                </div>

                {/* mini live tracking preview — the same map used in the tracking sheet */}
                <TrackingPanel active={acked} className="mt-3" heightClass="h-[120px]" />

                <div className="mt-3 grid grid-cols-3 gap-2">
                  <div className="stat-chip col-span-1">
                    <div className="font-display text-[7px] tracking-[0.14em] text-zinc-500">CARGO</div>
                    <div className="mt-0.5 truncate font-mono text-[10.5px] font-bold text-ember-300">{MISSION.cargo}</div>
                  </div>
                  <div className="stat-chip col-span-1">
                    <div className="font-display text-[7px] tracking-[0.14em] text-zinc-500">DIST. LEFT</div>
                    <div className="mt-0.5 font-mono text-[12px] font-bold text-white">{MISSION.distance}</div>
                  </div>
                  <div className="stat-chip col-span-1">
                    <div className="font-display text-[7px] tracking-[0.14em] text-zinc-500">ETA</div>
                    <div className="mt-0.5 font-mono text-[12px] font-bold text-white">{MISSION.eta}</div>
                  </div>
                </div>
              </div>
            )}
          </div>

          <div className="w-full space-y-2.5">
            {acked && (
              <button
                type="button" onClick={onTrackDrone} data-testid="sos-track"
                className="rise-in flex w-full items-center justify-center gap-2 rounded-3xl border border-ember-500/50 bg-gradient-to-b from-ember-900/70 to-void-panel py-4 font-display text-[13px] font-bold tracking-[0.2em] text-ember-300 transition-all duration-200 ease-in-out active:scale-[0.97]"
              >
                <Crosshair size={16} />TRACK DRONE
              </button>
            )}
            <button
              type="button" onClick={onCancel} data-testid="sos-cancel"
              className="relative w-full rounded-3xl border border-zinc-700 bg-void-raise py-4 font-display text-[13px] font-bold tracking-[0.2em] text-zinc-200 transition-all duration-200 ease-in-out active:scale-[0.97]"
            >
              <span className="flex items-center justify-center gap-2"><X size={16} />{acked ? 'CLOSE' : 'CANCEL SOS'}</span>
            </button>
          </div>
        </div>
      );
    };

    /* ═══════════ THUMB ZONE — hold-to-SOS + track button ═══════════ */

    const HOLD_MS = 800;

    const HoldSosButton = ({ onTrigger }) => {
      const [holdPct, setHoldPct] = useState(0);
      const timer = useRef(null);

      const stop = useCallback(() => {
        if (timer.current) { clearInterval(timer.current); timer.current = null; }
        setHoldPct(0);
      }, []);

      const start = () => {
        if (timer.current) return;
        const t0 = Date.now();
        timer.current = setInterval(() => {
          const p = Math.min((Date.now() - t0) / HOLD_MS, 1);
          setHoldPct(p);
          if (p >= 1) {
            clearInterval(timer.current); timer.current = null;
            onTrigger();
            setTimeout(() => setHoldPct(0), 350);
          }
        }, 40);
      };

      useEffect(() => stop, [stop]);

      const holding = holdPct > 0;
      return (
        <button
          type="button" data-testid="sos-hold"
          onPointerDown={start} onPointerUp={stop} onPointerLeave={stop} onPointerCancel={stop}
          onContextMenu={(e) => e.preventDefault()}
          className={`no-touch-callout relative flex-1 overflow-hidden rounded-3xl border py-4 outline-none transition-all duration-300 ease-in-out ${
            holding
              ? 'border-ember-400 shadow-[0_0_44px_rgba(255,69,0,0.5)] scale-[1.02]'
              : 'border-ember-500/60 shadow-[0_0_26px_rgba(255,69,0,0.28)] active:scale-[0.98]'
          } bg-gradient-to-b from-ember-900/70 to-void-panel`}
        >
          {/* hold progress fill */}
          <span className="absolute inset-0 bg-ember-500/80" style={{ width: `${holdPct * 100}%`, transition: holding ? 'none' : 'width .3s ease' }} />
          <span className="relative flex items-center justify-center gap-2.5">
            <PhoneCall size={19} className={holding ? 'text-black' : 'text-ember-400'} strokeWidth={2.4} />
            <span className="text-left">
              <span className={`block font-display text-[13px] font-bold leading-none tracking-[0.14em] ${holding ? 'text-black' : 'text-white'}`}>
                {holding ? 'KEEP HOLDING…' : 'SOS CALL'}
              </span>
              <span className={`mt-1 block font-display text-[8px] tracking-[0.18em] ${holding ? 'text-black/70' : 'text-zinc-500'}`}>
                HOLD TO TRANSMIT
              </span>
            </span>
          </span>
        </button>
      );
    };

    const ThumbBar = ({ onSos, onTrack }) => (
      <div className="absolute inset-x-0 bottom-0 z-30 px-4 pb-7 pt-10 bg-gradient-to-t from-black via-black/95 to-transparent">
        <div className="flex gap-3">
          <HoldSosButton onTrigger={onSos} />
          <button
            type="button" onClick={onTrack} data-testid="track-open"
            className="flex-1 rounded-3xl border border-zinc-700 bg-void-raise py-4 outline-none transition-all duration-300 ease-in-out hover:border-ember-500/50 active:scale-[0.98]"
          >
            <span className="flex items-center justify-center gap-2.5">
              <Crosshair size={19} className="text-ember-400" strokeWidth={2.2} />
              <span className="text-left">
                <span className="block font-display text-[13px] font-bold leading-none tracking-[0.14em]">TRACKING</span>
                <span className="mt-1 block font-display text-[8px] tracking-[0.18em] text-zinc-500">LIVE ROUTE &amp; POSITION</span>
              </span>
            </span>
          </button>
        </div>
        <span className="mx-auto mt-4 block h-1.5 w-32 rounded-full bg-zinc-700" />
      </div>
    );

    /* ═══════════ APP + DEVICE FRAME ═══════════ */

    const App = () => {
      const [sosOpen, setSosOpen] = useState(false);
      const [routeOpen, setRouteOpen] = useState(false);

      return (
        <div className="grid min-h-screen place-items-center bg-[radial-gradient(circle_at_50%_20%,#18181b_0%,#09090B_60%)] py-6">
          {/* device frame */}
          <div className="relative h-[874px] w-full max-w-[402px] overflow-hidden rounded-[50px] border-[12px] border-zinc-800 bg-void shadow-2xl shadow-black ring-1 ring-zinc-700/60">
            <StatusBar />
            <AppHeader />

            {/* scrollable content — padded for thumb bar */}
            <div className="app-scroll h-full overflow-y-auto pb-44">
              <GaugeCard />
              {!routeOpen && <LiveTracking />}
              <TriageList />
              <Shelters />
              <Feed />
              <p className="px-6 pb-6 pt-8 text-center font-display text-[8px] tracking-[0.24em] text-zinc-700">
                BLOODMOVE CMD v3.0 · ENCRYPTED FIELD LINK
              </p>
            </div>

            <ThumbBar onSos={() => setSosOpen(true)} onTrack={() => setRouteOpen(true)} />
            <RouteSheet open={routeOpen} onClose={() => setRouteOpen(false)} />
            <SosOverlay
              open={sosOpen}
              onCancel={() => setSosOpen(false)}
              onTrackDrone={() => { setSosOpen(false); setRouteOpen(true); }}
            />
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
